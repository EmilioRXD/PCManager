services:
  postgres:
    image: postgres:16-alpine
    container_name: pcmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pcmanager
      POSTGRES_USER: pcmanager
      POSTGRES_PASSWORD: pcmanager_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pcmanager -d pcmanager']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pcmanager-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pcmanager
      DB_USER: pcmanager
      DB_PASSWORD: pcmanager_secret
      JWT_SECRET: pcmanager_jwt_secret_cambiar_en_produccion
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pcmanager-client
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
