services:
  postgres:
    image: pcmanager-db:prod
    container_name: pcmanager-db
    environment:
      POSTGRES_DB: pcmanager
      POSTGRES_USER: pcmanager
      POSTGRES_PASSWORD: pcmanager_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcmanager -d pcmanager"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  server:
    image: pcmanager-server:prod
    container_name: pcmanager-server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pcmanager
      DB_USER: pcmanager
      DB_PASSWORD: pcmanager_secret
      JWT_SECRET: pcmanager_jwt_secret_cambiar_en_produccion
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  client:
    image: pcmanager-client:prod
    container_name: pcmanager-client
    depends_on:
      - server
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pcmanager.rule=Host(`mobiltech.scape.nexus`)"
      - "traefik.http.routers.pcmanager.entrypoints=websecure"
      - "traefik.http.routers.pcmanager.tls=true"
      - "traefik.http.routers.pcmanager.tls.certresolver=letsencrypt"
      - "traefik.http.services.pcmanager.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
